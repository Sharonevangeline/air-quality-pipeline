version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  env_file: .env
  environment:
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Kolkata
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Kolkata
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 4810126d1ab7f81e59ac081b44bd419778bd1e8671ae85e59341db0fcf9844a0
    PYTHONPATH: /opt/airflow/dags
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: bash -c "pip install requests psycopg2-binary && airflow db migrate && airflow users create --username admin --password admin --firstname Sharon --lastname Evangeline --role Admin --email sharonevangeline001@gmail.com"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install requests psycopg2-binary && airflow webserver"
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install requests psycopg2-binary && airflow scheduler"
    restart: always

volumes:
  postgres_data: